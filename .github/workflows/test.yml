name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0
          opam-disable-sandboxing: true

      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune runtest
